
name: Performance Tracking

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    env:
      PERF_CSV: perftest/perf_history.csv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: finufft-wheels-manylinux_x86_64
          path: wheelhouse/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install finufft wheel
        run: |
          python -m pip install pandas
          python -m pip install wheelhouse/finufft-2.6.0.dev0-py3-none-manylinux_2_28_x86_64.whl

      - name: Run performance test
        run: |
          python perftest/perftest.py ${{ github.sha }} ${{ env.PERF_CSV }}

      - name: Commit and push changes
        run: |
          git add ${{ env.PERF_CSV }}
          git commit --amend --no-edit
          git push 