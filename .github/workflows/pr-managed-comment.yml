name: PR managed comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-upsert-comment:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          cmake: true

      - name: Build latest master and PR head
        id: build
        continue-on-error: true
        run: |
          mkdir -p ../builds
          if [ ! -d ../builds/master ]; then
            git worktree add -f -d ../master origin/master
            cmake -B ../builds/master -S -DFINUFFT_BUILD_TESTS=ON &&
            cmake --build ../builds/master --target perftest -j
          fi
          if [ ! -d ../builds/pr-head ]; then
            git checkout ${{ github.event.pull_request.head.ref }}
            cmake -B ../builds/pr-head -DFINUFFT_BUILD_TESTS=ON &&
            cmake --build ../builds/pr-head --target perftest -j
          fi
          pip install pandas matplotlib
          python3 perftest/collect_dual_perftest.py \
            --master-perftest ../builds/master/perftest/perftest \
            --pr-perftest ../builds/pr-head/perftest/perftest


      - name: Find existing managed comment
        if: always()
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- pr-managed-comment -->"

      - name: Create managed PR comment
        if: always() && steps.find-comment.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md

      - name: Update managed PR comment
        if: always() && steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body-path: comment.md
