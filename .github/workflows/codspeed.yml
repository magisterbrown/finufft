name: CodSpeed

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfftw3-dev ninja-build libomp-dev

      - name: Build benchmarks
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFINUFFT_BUILD_TESTS=ON \
            -DCODSPEED_MODE=simulation \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFINUFFT_ARCH_FLAGS=""
          cmake --build build --target perftest_bench -j

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: ./build/perftest/benchmarks/perftest_bench
