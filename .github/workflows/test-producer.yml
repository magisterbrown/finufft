name: Test Producer

on:
  workflow_dispatch:

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - name: Create a dummy file
        run: |
          echo "This content was produced in the Test Producer workflow at $(date)" > test_data.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: test_data.txt
